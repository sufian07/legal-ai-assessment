target-version = "py311"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "SIM",  # simplify
    "RET",  # return statements
    "C90",  # mccabe complexity
]
ignore = [
    "E501",  # line length handled by formatter
]

[lint.mccabe]
max-complexity = 10

[lint.per-file-ignores]
"tests/*" = ["E501", "N802"]
